version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langgraph-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - PORT=8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: langgraph-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
